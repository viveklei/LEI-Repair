name: Deploy Project to Ubuntu VPS (CI/CD)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 63.250.41.178
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e  # Stop on any error

            echo "========================================"
            echo " LEI Repair — Auto Deploy Started"
            echo "========================================"

            cd /var/www/LEI-Repair

            echo "[1/6] Pulling latest code from GitHub..."
            git pull origin main

            echo "[2/6] Installing backend dependencies..."
            cd backend
            npm install --production=false

            echo "[3/6] Running Prisma migrations..."
            npx prisma generate
            npx prisma db push --accept-data-loss

            echo "[4/6] Building backend..."
            npm run build

            echo "[5/6] Restarting backend server (PM2)..."
            pm2 restart lei-backend --update-env || pm2 start dist/server.js --name lei-backend
            pm2 save

            echo "[6/6] Building frontend..."
            cd ../frontend
            npm install --legacy-peer-deps
            
            # Configure Node memory options for builder to prevent OOM / Killed process error (exit code 137)
            export NODE_OPTIONS="--max-old-space-size=1024"
            VITE_API_URL=https://frnd.leip.co.in/api npm run build

            echo "Reloading Nginx to serve latest frontend..."
            nginx -t && systemctl reload nginx

            echo ""
            echo "========================================"
            echo " ✅ Deployment Completed Successfully!"
            echo "========================================"
            pm2 status lei-backend
