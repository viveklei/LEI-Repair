name: Deploy Project to Ubuntu VPS (CI/CD)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 63.250.41.178
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "[*] Navigating to project directory..."
            cd /var/www/LEI-Repair
            
            echo "[*] Pulling latest code from GitHub..."
            git pull origin main
            
            echo "[*] Installing backend dependencies & rebuilding..."
            cd backend
            npm install
            npx prisma generate
            npx prisma db push
            npm run build
            
            echo "[*] Restarting Backend Server on PM2..."
            pm2 restart lei-backend || pm2 start dist/server.js --name lei-backend
            
            echo "[*] Installing frontend dependencies & rebuilding..."
            cd ../frontend
            npm install --legacy-peer-deps
            VITE_API_URL=https://frnd.leip.co.in/api npm run build
            
            echo "[+] Deployment completed successfully!"
